<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="utf-8">
  <title>彩票管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="libs/axios.min.js"></script>
</head>

<body class="container p-4">

  <h2>订单创建</h2>

  <input type="text" id="username" placeholder="用户名" class="form-control mb-2">
  <input type="number" id="price" placeholder="购买金额" class="form-control mb-2">
  <select id="schemeSelect" class="form-select mb-2"></select>
  <button onclick="createOrder()" class="btn btn-primary">下单</button>

  <hr>

  <h4>订单列表</h4>
  <table class="table table-bordered" id="orderTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>方案</th>
        <th>金额</th>
        <th>时间</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="js/orders.js"></script>
</body>

</html>
