<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <title>彩票管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="libs/axios.min.js"></script>
</head>
<body class="container p-4">

  <h2>方案管理</h2>

  <!-- 添加方案 -->
  <div class="mb-3">
    <input type="text" id="schemeName" placeholder="方案名称" class="form-control mb-2">
    <input type="text" id="schemeNumbers" placeholder="号码组合 (逗号分隔)" class="form-control mb-2">
    <button onclick="addScheme()" class="btn btn-primary">添加方案</button>
  </div>

  <!-- 方案列表 -->
  <h4>现有方案</h4>
  <table class="table table-bordered" id="schemeTable">
    <thead>
      <tr><th>ID</th><th>名称</th><th>号码组合</th><th>操作</th></tr>
    </thead>
    <tbody></tbody>
  </table>

<script src="js/schemes.js"></script>
</body>
</html>
