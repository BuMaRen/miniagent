<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <title>彩票管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="libs/axios.min.js"></script>
</head>
<body class="container p-4">

  <h2>开奖查询</h2>

  <input type="text" id="drawNumbers" placeholder="开奖号码 (逗号分隔)" class="form-control mb-2">
  <button onclick="checkResults()" class="btn btn-primary">查询中奖</button>

  <hr>

  <h4>中奖订单</h4>
  <table class="table table-bordered" id="resultTable">
    <thead>
      <tr>
        <th>用户名</th>
        <th>方案</th>
        <th>金额</th>
        <th>时间</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <!-- <ul id="resultList"></ul> -->

<script src="js/results.js"></script>
</body>
</html>
